<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
      
        <header class="header">
            <h1>Mis Tareas</h1>
            <div class="contadores">
                <span id="total">Total: 0</span>
                <span id="pendientes">Pendientes: 0</span>
                <span id="completadas">Completadas: 0</span>
            </div>
        </header>

      
        <section class="formulario">
            <form>
                <input id="input-tarea" type="text" placeholder="Escribe una nueva tarea..." required>
                <button type="submit" class="btn-agregar">Agregar</button>
            </form>
        </section>

        <section class="lista">
            <ul class="lista-tareas">
            </ul>
        </section>

        <footer>
            <button class="btn-limpiar-ultima">Limpiar ultima</button>
            <button class="btn-limpiar-completadas">Limpiar completadas</button>            
            <button class="btn-limpiar-todas">Limpiar todas</button>
        </footer>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
